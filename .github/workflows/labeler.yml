name: PR Auto-Labels

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── 1. Label by changed files ──────────────────────────────────
  path-labels:
    name: Area labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  # ── 2. Label by branch prefix ──────────────────────────────────
  branch-labels:
    name: Type labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const title  = context.payload.pull_request.title.toLowerCase();
            const labels = new Set();

            // Branch prefix → label
            const branchMap = {
              'feature/': 'enhancement',
              'feat/':    'enhancement',
              'fix/':     'bug',
              'hotfix/':  'bug',
              'docs/':    'documentation',
              'refactor/':'refactor',
              'chore/':   'chore',
              'test/':    'tests',
            };

            for (const [prefix, label] of Object.entries(branchMap)) {
              if (branch.startsWith(prefix)) labels.add(label);
            }

            // Conventional commit title → label
            const titleMap = {
              'feat':     'enhancement',
              'fix':      'bug',
              'docs':     'documentation',
              'refactor': 'refactor',
              'chore':    'chore',
              'test':     'tests',
              'perf':     'performance',
              'ci':       'ci/cd',
            };

            const match = title.match(/^(\w+)(?:\(.*?\))?:/);
            if (match) {
              const mapped = titleMap[match[1]];
              if (mapped) labels.add(mapped);
            }

            // Remove stale type labels that no longer apply
            const allTypeLabels = [...new Set([...Object.values(branchMap), ...Object.values(titleMap)])];
            const current = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
            })).data.map(l => l.name);

            for (const old of current.filter(l => allTypeLabels.includes(l) && !labels.has(l))) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: old,
              });
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [...labels],
              });
            }

  # ── 3. Label by PR size ────────────────────────────────────────
  size-labels:
    name: Size labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const changes = (pr.additions || 0) + (pr.deletions || 0);

            const sizes = [
              { max: 10,   label: 'size: XS' },
              { max: 50,   label: 'size: S' },
              { max: 200,  label: 'size: M' },
              { max: 500,  label: 'size: L' },
              { max: Infinity, label: 'size: XL' },
            ];

            const sizeLabel = sizes.find(s => changes <= s.max).label;
            const allSizeLabels = sizes.map(s => s.label);

            // Remove old size labels
            const current = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: pr.number,
            })).data.map(l => l.name);

            for (const old of current.filter(l => allSizeLabels.includes(l))) {
              if (old !== sizeLabel) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: pr.number,
                  name: old,
                });
              }
            }

            // Add correct size label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: pr.number,
              labels: [sizeLabel],
            });
